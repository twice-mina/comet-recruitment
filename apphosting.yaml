# ============================================
# FIREBASE APP HOSTING CONFIGURATION
# ============================================
# SETUP:
# 1. Replace YOUR_PROJECT_ID with your Firebase project ID
# 2. Replace YOUR_DOMAIN with your app's domain
# 3. Run: firebase apphosting:secrets:set <SECRET_NAME> for each secret
# ============================================

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ============================================
  # APP CONFIGURATION
  # ============================================
  - variable: NEXT_PUBLIC_APP_NAME
    value: "Email Split Test"

  - variable: NEXT_PUBLIC_APP_DESCRIPTION
    value: "Email split testing application"

  - variable: NEXT_PUBLIC_APP_URL
    value: https://YOUR_DOMAIN

  # ============================================
  # FIREBASE CONFIGURATION
  # ============================================
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: YOUR_PROJECT_ID

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: YOUR_PROJECT_ID.firebaseapp.com

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: YOUR_PROJECT_ID.firebasestorage.app

  - variable: GOOGLE_CLOUD_PROJECT
    value: YOUR_PROJECT_ID

  # ============================================
  # SECRETS (set via firebase apphosting:secrets:set)
  # ============================================
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
